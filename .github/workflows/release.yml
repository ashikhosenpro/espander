name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-14, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        env:
          ESPANDER_NOTIFICATIONS_URL: ${{ secrets.ESPANDER_NOTIFICATIONS_URL }}
        run: npm run tauri:build

      - name: Create macOS checksums
        if: runner.os == 'macOS'
        shell: bash
        run: |
          shasum -a 256 src-tauri/target/release/bundle/dmg/*.dmg > SHA256SUMS-macos.txt

      - name: Create Windows checksums
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $files = @(
            Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe
            Get-ChildItem src-tauri/target/release/bundle/msi/*.msi
          )
          $lines = foreach ($file in $files) {
            $hash = (Get-FileHash -Algorithm SHA256 $file.FullName).Hash.ToLowerInvariant()
            "$hash  $($file.Name)"
          }
          $lines | Set-Content -Encoding ascii SHA256SUMS-windows.txt

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: espander-macos
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
            SHA256SUMS-macos.txt

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: espander-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            SHA256SUMS-windows.txt

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            SHA256SUMS-*.txt
